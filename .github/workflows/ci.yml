name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_FLOOR: "1.25"

# Actions are pinned to commit SHAs (with the human-readable tag in a comment);
# Dependabot keeps them current. See SECURITY.md / the repo ruleset.

jobs:
  commit-author-check:
    name: commit-author-check
    runs-on: ubuntu-latest
    steps:
      # No persist-credentials override: the script fetches the base branch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Reject AI-authored commits
        run: ./scripts/check-commit-authors.sh

  build-check:
    name: build (go ${{ matrix.go }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25", "1.26"]
        goarch: ["amd64", "arm64"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  lint:
    name: lint (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [".", "prometheus", "contrib/gin", "contrib/echo", "contrib/fiber", "contrib/fasthttp", "contrib/iris", "contrib/negroni", "contrib/grpc", "examples"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_FLOOR }}
          check-latest: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: ${{ matrix.dir }}

  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

  nested-modules:
    name: nested-modules (${{ matrix.module }}, go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ["prometheus", "contrib/gin", "contrib/echo", "contrib/fiber", "contrib/fasthttp", "contrib/iris", "contrib/negroni", "contrib/grpc", "examples"]
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build and test module
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go test -race ./...

  govulncheck:
    name: govulncheck (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [".", "prometheus", "contrib/gin", "contrib/echo", "contrib/fiber", "contrib/fasthttp", "contrib/iris", "contrib/negroni", "contrib/grpc", "examples"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_FLOOR }}
          check-latest: true
      - name: Run govulncheck
        working-directory: ${{ matrix.dir }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

# CodeQL code scanning is enabled via GitHub's *default setup* (Settings ->
# Code security -> CodeQL analysis), which requires GitHub Advanced Security on
# the repository. It is intentionally not defined as an advanced workflow job
# here: running both default setup and an advanced workflow causes a
# configuration error, and an advanced job fails outright when Advanced Security
# is not enabled. Enable default setup to get the required "CodeQL" check.
