name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_FLOOR: "1.25"

jobs:
  commit-author-check:
    name: commit-author-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject AI-authored commits
        run: ./scripts/check-commit-authors.sh

  build-check:
    name: build (go ${{ matrix.go }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25", "1.26"]
        goarch: ["amd64", "arm64"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  lint:
    name: lint (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [".", "prometheus", "contrib/gin", "examples"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_FLOOR }}
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: ${{ matrix.dir }}

  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

  nested-modules:
    name: nested-modules (${{ matrix.module }}, go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ["prometheus", "contrib/gin", "examples"]
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build and test module
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go test -race ./...

  govulncheck:
    name: govulncheck (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [".", "prometheus", "contrib/gin", "examples"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_FLOOR }}
      - name: Run govulncheck
        working-directory: ${{ matrix.dir }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

# CodeQL code scanning is enabled via GitHub's *default setup* (Settings →
# Code security → CodeQL analysis), which requires GitHub Advanced Security on
# the repository. It is intentionally not defined as an advanced workflow job
# here: running both default setup and an advanced workflow causes a
# configuration error, and an advanced job fails outright when Advanced Security
# is not enabled. Enable default setup to get the required "CodeQL" check.
